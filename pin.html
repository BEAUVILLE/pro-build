<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>DIGIY BUILD PRO — Accès PIN</title>
  <meta name="theme-color" content="#061b14">
  <meta name="description" content="Accès BUILD PRO par slug et PIN.">

  <script src="./guard.js"></script>

  <style>
    :root{
      --bg:#061b14;
      --card:#0b2a1f;
      --line:rgba(255,255,255,.12);
      --text:#eafff1;
      --muted:rgba(234,255,241,.72);
      --gold:#facc15;
      --green:#22c55e;
      --red:#ef4444;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:
        radial-gradient(900px 500px at 12% 10%, rgba(250,204,21,.14), transparent 55%),
        radial-gradient(900px 500px at 90% 92%, rgba(34,197,94,.10), transparent 55%),
        linear-gradient(180deg, #04140f 0%, var(--bg) 60%, #04140f 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,sans-serif;
      display:grid;
      place-items:center;
      min-height:100vh;
      padding:16px;
    }

    .box{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .top{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:4px;
    }

    .logo{
      width:46px;
      height:46px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      background:
        radial-gradient(circle at 30% 30%, rgba(250,204,21,.22), transparent 60%),
        linear-gradient(135deg, rgba(34,197,94,.25), rgba(245,158,11,.18));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:22px;
      line-height:1.1;
    }

    .sub{
      margin:2px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .hintbox{
      border:1px solid rgba(250,204,21,.22);
      background:rgba(250,204,21,.06);
      border-radius:14px;
      padding:12px 14px;
      color:#fde68a;
      font-size:13px;
      font-weight:800;
      line-height:1.45;
      margin-top:2px;
    }

    label{
      display:block;
      font-size:12px;
      font-weight:900;
      letter-spacing:.3px;
      text-transform:uppercase;
      color:var(--muted);
      margin:4px 0 6px;
    }

    input{
      width:100%;
      padding:13px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:#092117;
      color:var(--text);
      font:inherit;
      font-weight:800;
      outline:none;
    }

    input::placeholder{
      color:rgba(255,255,255,.38);
    }

    input:focus{
      border-color:rgba(250,204,21,.45);
      box-shadow:0 0 0 3px rgba(250,204,21,.10);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .btn{
      flex:1;
      min-width:140px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font:inherit;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.15s;
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(250,204,21,.35);
    }

    .btn.primary{
      background:linear-gradient(135deg,#f97316,#facc15);
      color:#111;
      border-color:transparent;
      box-shadow:0 10px 24px rgba(249,115,22,.30);
    }

    .btn.primary:hover{
      box-shadow:0 14px 30px rgba(249,115,22,.45);
    }

    .btn.whatsapp{
      background:linear-gradient(135deg, rgba(34,197,94,.28), rgba(34,197,94,.14));
      border-color:rgba(34,197,94,.38);
    }

    .status{
      min-height:22px;
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.76);
      line-height:1.4;
      margin-top:2px;
    }

    .status.err{ color:#fca5a5; }
    .status.ok{ color:#86efac; }

    .mini{
      color:var(--muted);
      font-size:12.5px;
      line-height:1.45;
      margin-top:2px;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="top">
      <div class="logo">🔐</div>
      <div>
        <h1>Accès BUILD PRO</h1>
        <div class="sub">Entre ton slug pro et ton PIN pour ouvrir ton cockpit artisan.</div>
      </div>
    </div>

    <div class="hintbox">
      MULTI SERVICES terrain : plombier, électricien, maçon, soudeur, menuisier, mécanicien…
    </div>

    <div>
      <label for="slug">Slug pro</label>
      <input id="slug" placeholder="ex: build-221771342889" autocomplete="username">
    </div>

    <div>
      <label for="pin">PIN</label>
      <input id="pin" placeholder="Entrer le PIN" type="password" autocomplete="one-time-code">
    </div>

    <div class="actions">
      <button class="btn primary" id="btnGo" type="button">🔑 Entrer</button>
      <a class="btn whatsapp" id="btnSupport" href="https://wa.me/221771342889?text=Bonjour%20DIGIY%20BUILD.%20J%E2%80%99ai%20besoin%20d%E2%80%99aide%20pour%20mon%20acc%C3%A8s%20PIN." target="_blank" rel="noopener">
        💬 Support
      </a>
    </div>

    <div id="status" class="status">Prêt.</div>

    <div class="mini">
      Astuce : si tu arrives depuis un lien avec <b>?slug=...</b>, le champ se remplit tout seul.
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const qs = new URLSearchParams(location.search);
    const KEY_LAST_SLUG = "digiy_build_last_slug";

    function normSlug(v){
      return String(v || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^a-z0-9-]/g, "")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function normPin(v){
      return String(v || "").trim().replace(/\s+/g, "");
    }

    function setStatus(msg, tone = ""){
      const box = $("status");
      box.className = "status" + (tone ? " " + tone : "");
      box.textContent = msg;
    }

    function setBusy(on){
      $("btnGo").disabled = !!on;
      $("slug").disabled = !!on;
      $("pin").disabled = !!on;
    }

    function cockpitUrl(slug){
      return "./cockpit.html?slug=" + encodeURIComponent(slug);
    }

    function hydrateSlug(){
      const hinted = normSlug(qs.get("slug") || "");
      const stored = normSlug(localStorage.getItem(KEY_LAST_SLUG) || "");
      const chosen = hinted || stored || "";
      if(chosen){
        $("slug").value = chosen;
        setStatus("Slug détecté. Entre ton PIN.", "");
      }
    }

    async function go(){
      const slug = normSlug($("slug").value);
      const pin = normPin($("pin").value);

      if(!slug){
        setStatus("Slug manquant.", "err");
        $("slug").focus();
        return;
      }

      if(!pin){
        setStatus("PIN manquant.", "err");
        $("pin").focus();
        return;
      }

      if(!window.DIGIY_GUARD || typeof window.DIGIY_GUARD.loginWithPin !== "function"){
        setStatus("guard.js ne fournit pas loginWithPin.", "err");
        return;
      }

      setBusy(true);
      setStatus("Vérification du PIN...");

      try{
        const r = await window.DIGIY_GUARD.loginWithPin(slug, pin);

        if(!r || !r.ok){
          setStatus((r && r.error) || "Accès refusé.", "err");
          return;
        }

        try{
          localStorage.setItem(KEY_LAST_SLUG, slug);
          sessionStorage.setItem("digiy_build_slug", slug);
          sessionStorage.setItem("digiy_build_last_slug", slug);
        }catch(_){}

        setStatus("Accès validé. Ouverture du cockpit...", "ok");
        location.href = cockpitUrl(slug);
      }catch(e){
        console.error(e);
        setStatus("Erreur pendant la vérification.", "err");
      }finally{
        setBusy(false);
      }
    }

    $("btnGo").addEventListener("click", go);

    $("slug").addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        go();
      }
    });

    $("pin").addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        go();
      }
    });

    hydrateSlug();
  </script>
</body>
</html>
